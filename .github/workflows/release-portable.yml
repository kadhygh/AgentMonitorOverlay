name: Release Windows Portable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without v prefix"
        required: true
        default: "0.1.1"

permissions:
  contents: write

jobs:
  build-windows-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.13.0"
          cache: npm
          cache-dependency-path: overlay/package-lock.json

      - name: Install frontend dependencies
        working-directory: overlay
        run: npm ci

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "${{ inputs.version }}"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Portable package
        shell: pwsh
        run: .\scripts\release\build-portable.ps1 -Version "${{ steps.version.outputs.version }}" -SkipDependencyInstall

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMO-v${{ steps.version.outputs.version }}-win-x64
          path: |
            dist/portable/AMO-v${{ steps.version.outputs.version }}-win-x64.zip
            dist/portable/AMO-v${{ steps.version.outputs.version }}-win-x64.zip.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $assets = @(
            "dist/portable/AMO-v$version-win-x64.zip",
            "dist/portable/AMO-v$version-win-x64.zip.sha256"
          )
          gh release create "${{ github.ref_name }}" @assets --verify-tag --generate-notes --title "AMO v$version"
